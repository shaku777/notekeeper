<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Notes Manager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="app-title">📝 Smart Notes Manager</h1>
                <button id="darkModeToggle" class="dark-mode-toggle" aria-label="Toggle dark mode">
                    <span class="moon-icon">🌙</span>
                    <span class="sun-icon">☀️</span>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Add Note Section -->
            <section class="add-note-section">
                <h2 class="section-title">Create New Note</h2>
                <form id="noteForm" class="note-form">
                    <div class="form-group">
                        <label for="noteTitle" class="form-label">Title *</label>
                        <input 
                            type="text" 
                            id="noteTitle" 
                            class="form-input" 
                            placeholder="Enter note title..."
                            required
                            maxlength="100"
                        >
                    </div>
                    
                    <div class="form-group">
                        <label for="noteCategory" class="form-label">Category</label>
                        <select id="noteCategory" class="form-select">
                            <option value="personal">Personal</option>
                            <option value="work">Work</option>
                            <option value="ideas">Ideas</option>
                            <option value="todo">To-Do</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="noteDescription" class="form-label">Description *</label>
                        <textarea 
                            id="noteDescription" 
                            class="form-textarea" 
                            placeholder="Enter note description..."
                            required
                            maxlength="500"
                            rows="4"
                        ></textarea>
                        <div class="character-counter">
                            <span id="charCount">0</span> / 500
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">
                        <span id="submitBtnText">Add Note</span>
                    </button>
                </form>
            </section>

            <!-- Controls Section -->
            <section class="controls-section">
                <div class="controls-left">
                    <div class="search-box">
                        <input 
                            type="text" 
                            id="searchInput" 
                            class="search-input" 
                            placeholder="🔍 Search notes..."
                        >
                    </div>
                    
                    <div class="filter-controls">
                        <select id="categoryFilter" class="filter-select">
                            <option value="all">All Categories</option>
                            <option value="personal">Personal</option>
                            <option value="work">Work</option>
                            <option value="ideas">Ideas</option>
                            <option value="todo">To-Do</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>
                
                <div class="controls-right">
                    <select id="sortSelect" class="sort-select">
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                    </select>
                </div>
            </section>

            <!-- Notes Display Section -->
            <section class="notes-section">
                <div id="notesContainer" class="notes-container">
                    <!-- Notes will be dynamically added here -->
                </div>
                
                <!-- Empty State -->
                <div id="emptyState" class="empty-state">
                    <div class="empty-state-content">
                        <div class="empty-icon">📭</div>
                        <h3>No notes yet</h3>
                        <p>Start by creating your first note above!</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Confirm Delete</h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete this note? This action cannot be undone.</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelDelete">Cancel</button>
                <button class="btn btn-danger" id="confirmDelete">Delete</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
